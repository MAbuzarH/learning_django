<!DOCTYPE html>
<html>
<head>
<title>Students List</title>
</head>
<body>

<h1>Students list </h1>
<ul>
    {% for student in students  %}
      <li>
      <a href="{% url 'student_details' student.id %}" >{{student.name}} </a> |
      <a href="{% url 'student_update' student.id %}" >edit </a> |
        <a href="{% url 'student_delete' student.id %}" >delete </a>
      </li>
      {% endfor %}
</ul>
<a href="{% url 'student_create' %}">add more students </a>
</body>
</html>
