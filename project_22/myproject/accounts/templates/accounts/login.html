{% extends "accounts/base.html" %}

      
      {% block content %}
        <h1>login</h1>
      <form method="POST"  action="{% url 'login' %}">
        {% csrf_token %}
        <p>username: <input type="text" name="username"></p>
        <p>password: <input type="password" name="password"></p> 
        <button type="submit">Login</button>
      </form>
      {% endblock  %}
