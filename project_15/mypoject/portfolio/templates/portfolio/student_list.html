<html>
    <head>
        <title>Student List</title>
    </head>
    <body>
        <h1>Student List</h1>
        <ul>
            
            {% comment %} {% students = Student.objects.all() %} {% endcomment %}
            {%if students%}
            <table>
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Age</th>
                </tr>
            </thead>
            <tbody>
                {% for student in students %}
                <tr>
                    <td>{{ student.name }}</td>
                    <td>{{student.email}}</td>
                    <td>{{student.age}}</td>
                </tr>
                {% endfor %}
            </tbody>
            </table>
            {%  else%}
            <p>no student available</p>
            {% endif %}
        </ul>
    <body>
</html>
