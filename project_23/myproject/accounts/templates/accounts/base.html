<!DOCTYPE html>
<html>
<head>
<title>Django file upload demo</title>
</head>
<body>

<a href="{% url 'upload_profile' %}">UPLOAD PROFILE</a>
<a href="{% url 'view_profile' %}">VIEW PROFILE</a>
<hr>
{% if messages %}
<ul>
  {% for message in messages %} 
  <li>{{ message }}</li>
  {% endfor %}
</ul>
{% endif %}


<main>
  {% block content %}
  {% endblock  %}</main>
</body>
</html>
